/* ===== SPEECH ===== */
function gv(){
  const v=speechSynthesis.getVoices();
  return v.find(x=>x.lang==='zh-HK')
      || v.find(x=>x.lang.startsWith('zh-HK'))
      || v.find(x=>x.lang.startsWith('zh'))
      || null;
}
speechSynthesis.onvoiceschanged=gv;

function say(txt,r,cb){
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='zh-HK'; u.rate=r;
  const v=gv(); if(v) u.voice=v;
  if(cb) u.onend=cb;
  u.onerror=()=>{if(cb)cb();};
  speechSynthesis.speak(u);
}

/* split at comma nearest to middle */
function halves(s){
  if(s.length<=14) return [s];
  const cc=[];
  for(let i=0;i<s.length;i++) if('，、；'.includes(s[i])) cc.push(i);
  if(!cc.length) return [s];
  const m=s.length/2; let b=cc[0];
  for(const c of cc) if(Math.abs(c-m)<Math.abs(b-m)) b=c;
  return [s.substring(0,b+1), s.substring(b+1)];
}

function saySent(s,r,cb){
  const p=halves(s);
  if(p.length===1){ say(p[0],r,cb); }
  else{ say(p[0],r,()=>{ setTimeout(()=>say(p[1],r,cb),1100); }); }
}

    <button class="spd" onclick="setSpd(.85,this)">0.85×</button>
    <button class="spd on" onclick="setSpd(.9,this)">0.90×</button>
    <button class="spd" onclick="setSpd(1,this)">1.00×</button>
    <button class="spd" onclick="setSpd(1.05,this)">1.05×</button>
  </div>
  <div class="ctrls">
    <button class="btn bp" onclick="playAll()">▶ 播放全文（半句＋半句）</button>
    <button class="btn bs" onclick="stopTTS()">⏹ 停止語音</button>
  </div>
  <p class="ios-note">若未出聲，請先點擊頁面；iOS 需互動後才可播放。</p>
  <div id="artBox"></div>
  <div class="ctrls" style="margin-top:14px">
    <button class="btn bc" onclick="chkArt()">✅ 批改</button>
    <button class="btn bw" onclick="showArt()">👀 顯示全部答案</button>
    <button class="btn br" onclick="rstArt()">♻️ 重設</button>
  </div>
  <div class="status" id="artSt">尚未批改。</div>
  <details>
    <summary>教師預覽全文（不建議課堂顯示給學生）</summary>
    <div class="prev" id="tprev"></div>
  </details>
</div>
</div>

<!-- ===== PART 2 ===== -->
<div id="p2" class="tab-content">
<div class="card">
  <div class="inst">聆聽廣東話讀音，在空格內寫出字詞。<br>次序每次隨機排列，按 🔊 可重複聆聽。</div>
  <button class="shuf" onclick="doShuffle()">🔀 重新隨機排列</button>
  <div id="vocBox"></div>
  <div class="ctrls" style="margin-top:14px">
    <button class="btn bc" onclick="chkVoc()">✅ 批改</button>
    <button class="btn bw" onclick="showVoc()">👀 顯示全部答案</button>
    <button class="btn br" onclick="rstVoc()">♻️ 重設</button>
  </div>
  <div class="status" id="vocSt">尚未批改。</div>
</div>
</div>

<script>
/* ========== DATA ========== */
const PARAS=[
  {l:"第一段",s:[
    "虛擬實境（virtual reality，縮寫為VR）是甚麼？",
    "簡單來說，就是在電腦建構一個三維立體空間的虛構情境，只要人們戴上特定裝置，進入這個虛構情境後，就如同身處真實世界。",
    "近年，虛擬實境的技術越來越成熟，不少範疇如娛樂、教育、醫學等都應用這項技術，以提升產品或服務的質量。"
  ]},
  {l:"第二段",s:[
    "娛樂方面，虛擬實境能大大提升遊戲趣味。",
    "電子遊戲生產商推出各款虛擬實境遊戲，比傳統的電子遊戲更具吸引力，受用家歡迎。",
    "人們戴上一個既像頭盔又像眼鏡的虛擬實境裝置後，視覺會被它帶引着，除了仿如置身海底、森林或是太空，還會在視覺及聽覺方面得到強烈的刺激。"
  ]},
  {l:"第三段",s:[
    "教育方面，老師可以運用虛擬實境技術輔助教學。",
    "在香港，地理課每週只有兩節課，不可能常常做實地考察。",
    "有的學校開設了虛擬實境地理教室，身處校園的學生戴上學習眼鏡後，立即進入佔地六十一公頃的虛擬香港濕地公園，參觀一萬平方呎的室內展館，觀察地貌，「親身」感受，使學習過程更有趣、更有效。"
  ]},
  {l:"第四段",s:[
    "醫學方面，虛擬實境技術主要應用在培護人員和醫治病人上。",
    "通過虛擬實境，護士能從多角度觀察人體器官，了解人體運作。",
    "實習醫生看着虛擬實境眼鏡裏投射出來的病人，練習做手術。",
    "另外，有些醫生讓畏高症病患者置身於虛擬的高樓大廈上，從「上」往「下」望，幫助患者在安全的環境下克服畏高症。"
  ]},
  {l:"第五段",s:[
    "總括而言，虛擬實境能廣泛地應用在不同領域。",
    "我們應該多了解日新月異的科技發展，繼而把科技的用途進一步發揮，貢獻社會，這將是世界公民之福。"
  ]}
];
const VOCAB=["虛擬","建構","虛構","範疇","技術","質量","娛樂","仿如","刺激","輔助","考察","有效","培訓","解","廣泛","領域","日新月異","發揮"];

/* ========== STATE ========== */
let rate=0.9, playing=false, stopReq=false, shufV=[];

/* ========== TABS ========== */
function swTab(id){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id==='p1'?'t1b':'t2b').classList.add('active');
}

/* ========== SPEED ========== */
function setSpd(r,b){rate=r;document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));if(b)b.classList.add('on');}

/* ========== TTS ========== */
function getV(){
  const v=speechSynthesis.getVoices();
  return v.find(x=>x.lang==='zh-HK')||v.find(x=>x.lang.startsWith('zh-HK'))||v.find(x=>x.lang.startsWith('zh'))||null;
}
function say(txt){
  return new Promise(res=>{
    if(stopReq){res();return;}
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='zh-HK';u.rate=rate;
    const v=getV();if(v)u.voice=v;
    u.onend=res;u.onerror=res;
    speechSynthesis.speak(u);
  });
}
function wait(ms){
  return new Promise(res=>{
    const t0=Date.now();
    (function ck(){if(stopReq||Date.now()-t0>=ms)res();else setTimeout(ck,50);})();
  });
}
function stopTTS(){stopReq=true;playing=false;speechSynthesis.cancel();}

/* split sentence at a comma near the middle (skip commas inside parentheses) */
function halfSplit(s){
  let d=0;const cs=[];
  for(let i=0;i<s.length;i++){
    if(s[i]==='（'||s[i]==='(')d++;
    if(s[i]==='）'||s[i]===')')d--;
    if(s[i]==='，'&&d===0)cs.push(i);
  }
  if(!cs.length)return[s];
  const mid=s.length/2;let best=cs[0],bd=Math.abs(cs[0]-mid);
  cs.forEach(p=>{const dd=Math.abs(p-mid);if(dd<bd){bd=dd;best=p;}});
  return[s.substring(0,best+1),s.substring(best+1)];
}
async function saySent(s){
  const h=halfSplit(s);
  for(let i=0;i<h.length;i++){
    if(stopReq)return;
    await say(h[i]);
    if(i<h.length-1)await wait(1400);
  }
}
async function playPara(pi){
  if(playing){stopTTS();await wait(250);}
  stopReq=false;playing=true;
  for(const s of PARAS[pi].s){if(stopReq)break;await saySent(s);await wait(2800);}
  playing=false;
}
async function playAll(){
  if(playing){stopTTS();await wait(250);}
  stopReq=false;playing=true;
  for(let p=0;p<PARAS.length;p++){
    for(const s of PARAS[p].s){if(stopReq)break;await saySent(s);await wait(2800);}
    if(stopReq)break;await wait(3800);
  }
  playing=false;
}
async function playOne(pi,si){
  if(playing){stopTTS();await wait(250);}
  stopReq=false;playing=true;
  await saySent(PARAS[pi].s[si]);
  playing=false;
}

/* ========== BUILD ARTICLE ========== */
function buildArt(){
  const box=document.getElementById('artBox');
  let h='',idx=0;
  PARAS.forEach((p,pi)=>{
    h+=`<div class="psec"><div class="phdr"><span>${p.l}</span><button class="btn bp bsm" onclick="playPara(${pi})">▶ 播放本段</button></div>`;
    p.s.forEach((s,si)=>{
      const rows=Math.max(2,Math.ceil(s.length/28));
      h+=`<div class="srow" id="sr${idx}">
        <div class="snum">${idx+1}</div>
        <div class="sbody">
          <textarea class="sinp" id="si${idx}" rows="${rows}" placeholder="在此默寫…"></textarea>
          <div class="sans" id="sa${idx}">${esc(s)}</div>
          <div class="sdiff" id="sd${idx}"></div>
        </div>
        <button class="btn bp bsm" onclick="playOne(${pi},${si})" title="播放此句">🔊</button>
      </div>`;
      idx++;
    });
    h+=`</div>`;
  });
  box.innerHTML=h;

  /* auto-resize textareas */
  document.querySelectorAll('.sinp').forEach(ta=>{
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  });

  /* teacher preview */
  let pv="第四課\n虛擬實境的應用\n\n";
  PARAS.forEach(p=>{pv+=p.s.join('')+'\n\n';});
  document.getElementById('tprev').textContent=pv.trim();
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function norm(t){return t.replace(/[\s\u3000]+/g,'');}

/* ========== CHECK ARTICLE ========== */
function chkArt(){
  let ok=0,tot=0,idx=0;
  PARAS.forEach(p=>{p.s.forEach(s=>{
    const inp=document.getElementById('si'+idx);
    const row=document.getElementById('sr'+idx);
    const ans=document.getElementById('sa'+idx);
    const dif=document.getElementById('sd'+idx);
    const uTxt=norm(inp.value), cTxt=norm(s);
    row.classList.remove('ok','no');dif.innerHTML='';
    if(uTxt===cTxt){row.classList.add('ok');ok++;}
    else if(uTxt.length>0){row.classList.add('no');ans.classList.add('vis');dif.innerHTML=diffHTML(uTxt,cTxt);}
    else{row.classList.add('no');ans.classList.add('vis');}
    tot++;idx++;
  });});
  document.getElementById('artSt').innerHTML=`批改結果：共 <b>${tot}</b> 句，答對 <b style="color:#16a34a">${ok}</b> 句，答錯 <b style="color:#ef4444">${tot-ok}</b> 句`;
}

function diffHTML(u,c){
  /* simple char-by-char diff */
  let h='<span style="font-size:.88rem;color:#64748b">逐字對比：</span><br>';
  const ul=[...u],cl=[...c],mx=Math.max(ul.length,cl.length);
  for(let i=0;i<mx;i++){
    if(i<ul.length&&i<cl.length){
      if(ul[i]===cl[i])h+=`<span style="color:#16a34a">${esc(cl[i])}</span>`;
      else h+=`<span style="background:#fecaca;color:#dc2626;text-decoration:line-through">${esc(ul[i])}</span><span style="background:#bbf7d0;color:#166534">${esc(cl[i])}</span>`;
    }else if(i>=ul.length){
      h+=`<span style="background:#fef08a;color:#854d0e">${esc(cl[i])}</span>`;
    }else{
      h+=`<span style="background:#fecaca;color:#dc2626;text-decoration:line-through">${esc(ul[i])}</span>`;
    }
  }
  return h;
}

function showArt(){document.querySelectorAll('.sans').forEach(e=>e.classList.add('vis'));}
function rstArt(){
  let idx=0;
  PARAS.forEach(p=>{p.s.forEach(()=>{
    document.getElementById('si'+idx).value='';
    document.getElementById('si'+idx).style.height='';
    document.getElementById('sa'+idx).classList.remove('vis');
    document.getElementById('sd'+idx).innerHTML='';
    document.getElementById('sr'+idx).classList.remove('ok','no');
    idx++;
  });});
  document.getElementById('artSt').textContent='尚未批改。';
}

/* ========== VOCAB ========== */
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function buildVoc(){shufV=shuf(VOCAB);renderVoc();}
function renderVoc(){
  const box=document.getElementById('vocBox');
  let h='';
  shufV.forEach((w,i)=>{
    h+=`<div class="vrow" id="vr${i}">
      <span class="vnum">${i+1}.</span>
      <button class="vspk" onclick="sayW('${w}')" title="播放讀音">🔊</button>
      <input type="text" class="vinp" id="vi${i}" placeholder="寫出字詞">
      <span class="vans" id="va${i}">${w}</span>
      <span class="vres" id="vx${i}"></span>
    </div>`;
  });
  box.innerHTML=h;
}
function sayW(w){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.lang='zh-HK';u.rate=Math.max(rate-.05,.55);
  const v=getV();if(v)u.voice=v;
  speechSynthesis.speak(u);
}
function doShuffle(){shufV=shuf(VOCAB);renderVoc();document.getElementById('vocSt').textContent='已重新排列，尚未批改。';}
function chkVoc(){
  let ok=0;
  shufV.forEach((w,i)=>{
    const row=document.getElementById('vr'+i);
    const res=document.getElementById('vx'+i);
    const ans=document.getElementById('va'+i);
    const uTxt=norm(document.getElementById('vi'+i).value),cTxt=norm(w);
    row.classList.remove('ok','no');
    if(uTxt===cTxt){row.classList.add('ok');res.textContent='✅';ok++;}
    else{row.classList.add('no');res.textContent='❌';ans.classList.add('vis');}
  });
  document.getElementById('vocSt').innerHTML=`批改結果：共 <b>${shufV.length}</b> 詞，答對 <b style="color:#16a34a">${ok}</b> 詞，答錯 <b style="color:#ef4444">${shufV.length-ok}</b> 詞`;
}
function showVoc(){document.querySelectorAll('.vans').forEach(e=>e.classList.add('vis'));}
function rstVoc(){
  shufV.forEach((_,i)=>{
    document.getElementById('vi'+i).value='';
    document.getElementById('va'+i).classList.remove('vis');
    document.getElementById('vr'+i).classList.remove('ok','no');
    document.getElementById('vx'+i).textContent='';
  });
  document.getElementById('vocSt').textContent='尚未批改。';
}

/* ========== INIT ========== */
speechSynthesis.onvoiceschanged=()=>{};
window.addEventListener('DOMContentLoaded',()=>{speechSynthesis.getVoices();buildArt();buildVoc();});
</script>
</body>
