<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>默寫練習｜半句朗讀停頓再續句（早發白帝城）</title>
  <style>
    :root { color-scheme: light; font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 1rem;
      background: #f8fafc; color: #0f172a; line-height: 1.6;
    }
    .container {
      max-width: 960px; margin: 0 auto;
      background: #ffffff; border: 1px solid #e2e8f0;
      border-radius: 14px; box-shadow: 0 10px 28px rgba(15,23,42,0.08);
      padding: 1.15rem;
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.45rem; font-weight: 700; }
    .sub { margin: 0 0 1rem; color: #475569; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      align-items: center; margin-bottom: 1rem;
    }
    .controls label { font-size: 0.95rem; color: #334155; }
    select, button {
      font-size: 0.95rem; padding: 0.45rem 0.75rem;
      border-radius: 8px; border: 1px solid #cbd5e1;
      background: #fff; cursor: pointer;
    }
    button {
      border: none; background: #e2e8f0; color: #0f172a;
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }
    button.primary { background: #2563eb; color: #fff; box-shadow: 0 6px 14px rgba(37,99,235,0.2); }
    button.play { background: #22c55e; color: #fff; box-shadow: 0 6px 14px rgba(34,197,94,0.2); }
    button.stop { background: #f97316; color: #fff; box-shadow: 0 6px 14px rgba(249,115,22,0.2); }
    button:active { transform: translateY(1px); box-shadow: none; }
    .pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.65rem; border-radius: 999px;
      background: #e0f2fe; border: 1px solid #bae6fd;
      color: #0369a1; font-size: 0.9rem;
    }
    .list { display: grid; gap: 1rem; }
    .card {
      border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 0.9rem; background: #f8fafc;
    }
    .card-header {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      align-items: center; justify-content: space-between;
    }
    .card h3 { margin: 0; font-size: 1.02rem; }
    .chunk-bar {
      margin-top: 0.55rem; display: flex; flex-wrap: wrap; gap: 0.45rem;
    }
    .chunk-btn {
      background: #e2e8f0; color: #0f172a;
      border: 1px solid #cbd5e1;
      border-radius: 8px; padding: 0.35rem 0.6rem;
      font-size: 0.9rem; cursor: pointer;
    }
    .chunk-btn:hover { background: #d9e4f5; }
    .input-row { margin-top: 0.55rem; display: grid; gap: 0.35rem; }
    textarea {
      width: 100%; min-height: 70px; padding: 0.55rem 0.65rem;
      border-radius: 8px; border: 1px solid #cbd5e1;
      font-size: 1rem; resize: vertical;
    }
    .status { font-size: 0.9rem; color: #1e293b; }
    .status.correct { color: #16a34a; }
    .status.wrong { color: #dc2626; }
    details {
      margin-top: 0.35rem; background: #fff;
      border: 1px dashed #cbd5e1; border-radius: 8px;
      padding: 0.45rem 0.65rem;
    }
    details summary { cursor: pointer; color: #0ea5e9; font-weight: 600; }
    .ans-text { color: #0f172a; white-space: pre-line; }
    @media (max-width: 640px) {
      .controls { flex-direction: column; align-items: flex-start; }
      .card-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>默寫練習｜半句朗讀停頓再續句（早發白帝城）</h1>
    <p class="sub">老師朗讀：先半句，停頓，再後半句；學生聽後默寫，平時不顯示文字，僅在「顯示答案」時才露出。</p>

    <div class="controls">
      <label>語速：
        <select id="rateSelect">
          <option value="0.9">0.90×</option>
          <option value="0.95" selected>0.95×</option>
          <option value="1">1.00×</option>
          <option value="1.05">1.05×</option>
        </select>
      </label>
      <button id="playAllBtn" class="play">▶ 播放全詩（半句＋半句）</button>
      <button id="stopBtn" class="stop">⏹ 停止語音</button>
      <span class="pill">若未出聲，請先點擊頁面；iOS 需互動後才可播放。</span>
    </div>

    <div class="list" id="list"></div>

    <div class="controls" style="margin-top:1rem;">
      <button id="checkBtn" class="primary">✅ 批改</button>
      <button id="showBtn">👀 顯示全部答案</button>
      <button id="resetBtn">♻️ 重設</button>
      <span id="globalStatus" class="pill">尚未批改。</span>
    </div>

    <details style="margin-top:1rem;">
      <summary>教師預覽全文（不建議課堂顯示給學生）</summary>
      <div class="ans-text" style="margin-top:0.5rem; font-size:0.98rem;">
早發白帝城
李白
朝辭白帝彩雲間，千里江陵一日還。
兩岸猿聲啼不住，輕舟已過萬重山。
      </div>
    </details>
  </div>

  <script>
    // 詩句資料：每行分成兩半（以逗號或頓號切），若無逗號則平均切半
    const LINES = [
      { full: "朝辭白帝彩雲間，千里江陵一日還。", first: "朝辭白帝彩雲間，", second: "千里江陵一日還。" },
      { full: "兩岸猿聲啼不住，輕舟已過萬重山。", first: "兩岸猿聲啼不住，", second: "輕舟已過萬重山。" }
    ];

    const rateSelect = document.getElementById('rateSelect');
    const listEl = document.getElementById('list');
    const playAllBtn = document.getElementById('playAllBtn');
    const stopBtn = document.getElementById('stopBtn');
    const checkBtn = document.getElementById('checkBtn');
    const showBtn = document.getElementById('showBtn');
    const resetBtn = document.getElementById('resetBtn');
    const globalStatus = document.getElementById('globalStatus');

    let cancelAll = false;

    function buildUI() {
      listEl.innerHTML = '';
      LINES.forEach((line, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';

        const h3 = document.createElement('h3');
        h3.textContent = `第 ${idx + 1} 行`;
        header.appendChild(h3);

        const wholeBtn = document.createElement('button');
        wholeBtn.className = 'play';
        wholeBtn.textContent = '🔊 半句 + 半句播放';
        wholeBtn.addEventListener('click', () => playLine(line));
        header.appendChild(wholeBtn);

        card.appendChild(header);

        const chunkBar = document.createElement('div');
        chunkBar.className = 'chunk-bar';

        const btn1 = document.createElement('button');
        btn1.className = 'chunk-btn';
        btn1.textContent = '第 1 段（前半句）';
        btn1.addEventListener('click', () => speakText(line.first));
        chunkBar.appendChild(btn1);

        const btn2 = document.createElement('button');
        btn2.className = 'chunk-btn';
        btn2.textContent = '第 2 段（後半句）';
        btn2.addEventListener('click', () => speakText(line.second));
        chunkBar.appendChild(btn2);

        card.appendChild(chunkBar);

        const row = document.createElement('div');
        row.className = 'input-row';

        const ta = document.createElement('textarea');
        ta.placeholder = '聽後默寫完整一行';
        ta.dataset.answer = line.full;
        row.appendChild(ta);

        const status = document.createElement('span');
        status.className = 'status';
        row.appendChild(status);

        card.appendChild(row);

        const det = document.createElement('details');
        const sum = document.createElement('summary');
        sum.textContent = '顯示答案（僅教師/檢查）';
        det.appendChild(sum);

        const ans = document.createElement('div');
        ans.className = 'ans-text';
        ans.textContent = line.full;
        det.appendChild(ans);

        card.appendChild(det);

        listEl.appendChild(card);
      });
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    function speakUtterance(text, rate) {
      return new Promise(resolve => {
        if (!('speechSynthesis' in window)) { resolve(); return; }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW';
        u.rate = rate;
        u.onend = () => resolve();
        u.onerror = () => resolve();
        window.speechSynthesis.speak(u);
      });
    }

    async function speakText(text) {
      if (!('speechSynthesis' in window)) return;
      cancelAll = false;
      window.speechSynthesis.cancel();
      const rate = parseFloat(rateSelect.value || '1');
      await speakUtterance(text, rate);
    }

    async function playLine(line) {
      if (!('speechSynthesis' in window)) return;
      cancelAll = false;
      window.speechSynthesis.cancel();
      const rate = parseFloat(rateSelect.value || '1');
      await speakUtterance(line.first, rate);
      if (cancelAll) return;
      await wait(320);
      if (cancelAll) return;
      await speakUtterance(line.second, rate);
    }

    async function playAll() {
      if (!('speechSynthesis' in window)) return;
      cancelAll = false;
      window.speechSynthesis.cancel();
      const rate = parseFloat(rateSelect.value || '1');
      for (const line of LINES) {
        if (cancelAll) break;
        await speakUtterance(line.first, rate);
        if (cancelAll) break;
        await wait(320);
        if (cancelAll) break;
        await speakUtterance(line.second, rate);
        if (cancelAll) break;
        await wait(600);
      }
    }

    function normalize(str) {
      return (str || '')
        .replace(/[\s\u3000]/g, '')
        .replace(/[，。！？、：「」『』（）《》〈〉—…．,.;:!?'"\(\)﹐﹑﹒﹔﹕﹖﹗﹙﹚﹜﹝]/g, '');
    }

    checkBtn.addEventListener('click', () => {
      let allCorrect = true;
      document.querySelectorAll('.card').forEach(card => {
        const ta = card.querySelector('textarea');
        const status = card.querySelector('.status');
        const ans = normalize(ta.dataset.answer || '');
        const val = normalize(ta.value || '');
        if (val && val === ans) {
          status.textContent = '✔ 正確';
          status.className = 'status correct';
        } else {
          status.textContent = val ? '✘ 再試一次' : '✎ 請先作答';
          status.className = 'status wrong';
          allCorrect = false;
        }
      });
      globalStatus.textContent = allCorrect ? '全部正確！' : '已批改，尚有錯誤。';
    });

    showBtn.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(card => {
        const ta = card.querySelector('textarea');
        const status = card.querySelector('.status');
        ta.value = ta.dataset.answer || '';
        status.textContent = '✔ 已顯示答案';
        status.className = 'status correct';
      });
      globalStatus.textContent = '已顯示答案。';
    });

    resetBtn.addEventListener('click', () => {
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      cancelAll = true;
      document.querySelectorAll('.card').forEach(card => {
        const ta = card.querySelector('textarea');
        const status = card.querySelector('.status');
        ta.value = '';
        status.textContent = '';
        status.className = 'status';
      });
      globalStatus.textContent = '尚未批改。';
    });

    stopBtn.addEventListener('click', () => {
      cancelAll = true;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    });

    playAllBtn.addEventListener('click', () => {
      cancelAll = false;
      playAll();
    });

    // iOS 需互動解鎖音訊
    document.body.addEventListener('click', () => {}, { once: true });

    buildUI();
  </script>
</body>
</html>
